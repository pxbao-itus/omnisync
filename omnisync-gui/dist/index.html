<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2" />
                    </svg>
                </div>
                <span class="brand-name">OmniSync</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-label">Providers</div>
                <button class="nav-item active" data-provider="all">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <path
                                d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
                        </svg>
                    </span>
                    <span class="nav-text">All Providers</span>
                    <span class="nav-badge" id="badge-all">0</span>
                </button>
                <button class="nav-item" data-provider="gdrive">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                            <path d="M12 2L2 19.5h7.5L12 14l2.5 5.5H22L12 2z" fill="#4285F4" />
                            <path d="M2 19.5l3.5-6L12 14l-2.5 5.5H2z" fill="#FBBC04" />
                            <path d="M9.5 19.5H22l-3.5-6H5.5l3.5 6h.5z" fill="#34A853" />
                        </svg>
                    </span>
                    <span class="nav-text">Google Drive</span>
                    <span class="nav-badge" id="badge-gdrive">0</span>
                </button>
                <button class="nav-item" data-provider="icloud">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5AC8FA" stroke-width="2">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />
                        </svg>
                    </span>
                    <span class="nav-text">iCloud</span>
                    <span class="nav-badge" id="badge-icloud">0</span>
                </button>
                <button class="nav-item" data-provider="onedrive">
                    <span class="nav-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0078D4" stroke-width="2">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />
                        </svg>
                    </span>
                    <span class="nav-text">OneDrive</span>
                    <span class="nav-badge" id="badge-onedrive">0</span>
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="version">v0.1.0</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <h1 class="header-title">Synced Folders</h1>
                    <p class="header-subtitle" id="subtitle">Manage your synchronized directories</p>
                </div>
                <div id="sync-status-indicator"
                    style="display: none; align-items: center; gap: 8px; background: rgba(0, 210, 255, 0.1); border: 1px solid rgba(0, 210, 255, 0.2); padding: 6px 14px; border-radius: 20px; font-size: 11px; color: #00d2ff; margin-right: 16px;">
                    <div class="sync-spinner"></div>
                    <span id="sync-status-text">Syncing...</span>
                </div>
                <button class="btn-add" id="btn-add">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round">
                        <line x1="12" y1="5" x2="12" y2="19" />
                        <line x1="5" y1="12" x2="19" y2="12" />
                    </svg>
                    Add Folder
                </button>
            </header>

            <!-- Folder List -->
            <div class="content">
                <div class="folder-list" id="folder-list">
                    <!-- Dynamic content rendered by JS -->
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="empty-state" style="display: none;">
                    <div class="empty-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" />
                            <line x1="12" y1="11" x2="12" y2="17" />
                            <line x1="9" y1="14" x2="15" y2="14" />
                        </svg>
                    </div>
                    <h2 class="empty-title">No folders synced yet</h2>
                    <p class="empty-desc">Click "Add Folder" to start syncing a directory with your cloud provider.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Folder Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">Add Sync Folder</h2>
                <button class="modal-close" id="modal-close">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                </button>
            </div>
            <form class="modal-form" id="add-form">
                <div class="form-group">
                    <label class="form-label">Cloud Provider</label>
                    <div class="provider-grid">
                        <label class="provider-card selected" data-provider="gdrive">
                            <input type="radio" name="provider" value="gdrive" checked hidden />
                            <div class="provider-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 19.5h7.5L12 14l2.5 5.5H22L12 2z" fill="#4285F4" />
                                    <path d="M2 19.5l3.5-6L12 14l-2.5 5.5H2z" fill="#FBBC04" />
                                    <path d="M9.5 19.5H22l-3.5-6H5.5l3.5 6h.5z" fill="#34A853" />
                                </svg>
                            </div>
                            <span class="provider-name">Google Drive</span>
                            <div id="status-gdrive" class="provider-status">Not connected</div>
                        </label>
                        <label class="provider-card" data-provider="icloud">
                            <input type="radio" name="provider" value="icloud" hidden />
                            <div class="provider-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#5AC8FA"
                                    stroke-width="2">
                                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />
                                </svg>
                            </div>
                            <span class="provider-name">iCloud</span>
                            <span class="provider-soon">Soon</span>
                        </label>
                        <label class="provider-card" data-provider="onedrive">
                            <input type="radio" name="provider" value="onedrive" hidden />
                            <div class="provider-icon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0078D4"
                                    stroke-width="2">
                                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />
                                </svg>
                            </div>
                            <span class="provider-name">OneDrive</span>
                            <span class="provider-soon">Soon</span>
                        </label>
                    </div>
                </div>

                <!-- Credentials Section (Moved here) -->
                <div id="auth-section" style="display: none;">
                    <!-- Not Connected State -->
                    <div id="auth-disconnected">
                        <div class="form-group">
                            <label class="form-label">Connect Account</label>
                            <p class="form-help">Securely connect your Google account to start syncing.</p>
                            <button type="button" class="btn-submit" id="btn-oauth"
                                style="margin-top: 10px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 19.5h7.5L12 14l2.5 5.5H22L12 2z" fill="#4285F4" />
                                    <path d="M2 19.5l3.5-6L12 14l-2.5 5.5H2z" fill="#FBBC04" />
                                    <path d="M9.5 19.5H22l-3.5-6H5.5l3.5 6h.5z" fill="#34A853" />
                                </svg>
                                Log in with Google
                            </button>

                            <div style="margin: 20px 0; display: flex; align-items: center; gap: 10px; opacity: 0.3;">
                                <div style="flex: 1; height: 1px; background: white;"></div>
                                <span style="font-size: 10px; text-transform: uppercase;">or</span>
                                <div style="flex: 1; height: 1px; background: white;"></div>
                            </div>

                            <label class="form-label" style="font-size: 10px; opacity: 0.6;">Manual Access Token</label>
                            <div class="input-row">
                                <input type="password" class="form-input" id="input-token"
                                    placeholder="Paste token..." />
                                <button type="button" class="btn-browse" id="btn-connect"
                                    style="font-size: 11px;">Connect</button>
                            </div>
                        </div>
                    </div>

                    <!-- Connected State -->
                    <div id="auth-connected"
                        style="display: none; background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.2); border-radius: var(--radius-md); padding: 16px; margin-bottom: 20px;">
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div
                                style="width: 40px; height: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                                    <path d="M12 2L2 19.5h7.5L12 14l2.5 5.5H22L12 2z" fill="#4285F4" />
                                    <path d="M2 19.5l3.5-6L12 14l-2.5 5.5H2z" fill="#FBBC04" />
                                    <path d="M9.5 19.5H22l-3.5-6H5.5l3.5 6h.5z" fill="#34A853" />
                                </svg>
                            </div>
                            <div style="flex: 1;">
                                <div style="font-size: 14px; font-weight: 600; color: #fff;">Account Connected</div>
                                <div style="font-size: 12px; color: rgba(255, 255, 255, 0.6);" id="connected-account">
                                    Google Drive</div>
                            </div>
                            <button type="button" id="btn-disconnect"
                                style="padding: 6px 12px; background: rgba(255, 82, 82, 0.1); color: #ff5252; border: 1px solid rgba(255, 82, 82, 0.3); border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer;">Disconnect</button>
                        </div>
                    </div>
                </div>

                <div id="sync-fields" style="opacity: 0.5; pointer-events: none;">
                    <div class="form-group">
                        <label class="form-label">Local Folder Path</label>
                        <div class="input-row">
                            <input type="text" class="form-input" id="input-local" placeholder="/home/user/Documents"
                                required />
                            <button type="button" class="btn-browse" id="btn-browse">Browse</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Remote Folder (on Google Drive)</label>
                        <select class="form-input" id="select-remote" required>
                            <option value="" disabled selected>Select a folder...</option>
                        </select>
                    </div>
                </div>
        </div>

        <div class="modal-actions">
            <button type="button" class="btn-cancel" id="btn-cancel">Cancel</button>
            <button type="submit" class="btn-submit" id="btn-add-submit" disabled>Add Folder</button>
        </div>
        </form>
    </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
